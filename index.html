<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Workflow Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; }
        .bento-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            transition: all 0.3s ease;
        }
        .bento-card:hover { transform: translateY(-5px); border-color: #3b82f6; }
    </style>
</head>
<body class="p-8">
    <header class="max-w-6xl mx-auto mb-12 text-center">
        <h1 class="text-4xl font-bold mb-4 bg-gradient-to-r from-blue-400 to-purple-500 bg-clip-text text-transparent">
            AI Business Update
        </h1>
        <p class="text-gray-400">자동으로 업데이트되는 최신 AI 업무 활용 소식</p>
    </header>

    <main id="news-grid" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- 데이터가 여기에 삽입됩니다 -->
        <div class="text-center col-span-full">로딩 중...</div>
    </main>

    <script>
        // data.json 파일을 읽어서 화면에 표시
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                const grid = document.getElementById('news-grid');
                grid.innerHTML = '';
                data.forEach((item, index) => {
                    const card = document.createElement('div');
                    // 첫 번째 카드는 크게 (Bento 포인트)
                    const colSpan = index === 0 ? 'md:col-span-2 md:row-span-2' : '';
                    card.className = `bento-card p-6 ${colSpan}`;
                    card.innerHTML = `
                        <span class="text-xs text-blue-400 font-mono mb-2 block">${item.date}</span>
                        <h2 class="text-xl font-semibold mb-3">${item.title}</h2>
                        <p class="text-gray-400 text-sm mb-4">${item.summary}</p>
                        <a href="${item.link}" target="_blank" class="text-blue-500 text-sm hover:underline">자세히 보기 →</a>
                    `;
                    grid.appendChild(card);
                });
            });
    </script>
</body>
</html>
